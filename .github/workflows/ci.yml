name: Verify and package

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: bridge/go.mod
      - run: npm ci
      - run: npm run build
      - run: npm run test:all
      - run: npm audit --audit-level=high

  windows-bridge-self-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: bridge/go.mod
      - run: go build -buildvcs=false -trimpath -o bin/apex-lmu-bridge.exe .
        working-directory: bridge
      - run: go build -buildvcs=false -trimpath -o "bin/Le Mans Ultimate.exe" ./cmd/lmu-fixture
        working-directory: bridge
      - run: |
          $env:APEX_LMU_BRIDGE_EXE = (Resolve-Path 'bin/apex-lmu-bridge.exe')
          $env:APEX_LMU_FIXTURE_EXE = (Resolve-Path 'bin/Le Mans Ultimate.exe')
          go test -buildvcs=false ./...
        working-directory: bridge
      - run: bridge\bin\apex-lmu-bridge.exe --self-test --frames=8 --run-id=windows-ci > bridge-self-test.ndjson
        shell: cmd
      - run: node scripts/assert-bridge-self-test.cjs bridge-self-test.ndjson 8 windows-ci

  windows-installer:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: bridge/go.mod
      - run: npm ci
      - run: npm run build:desktop:win
      - uses: actions/upload-artifact@v4
        with:
          name: apex-for-lmu-windows
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
