name: Verify and package

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.24.x'
          cache-dependency-path: bridge/go.mod
      - run: npm ci
      - run: npm run build
      - run: npm run test:all
      - run: npm audit --audit-level=high

  windows-bridge-self-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.24.x'
          cache-dependency-path: bridge/go.mod
      - run: go build -buildvcs=false -trimpath -o bin/apex-lmu-bridge.exe .
        working-directory: bridge
      - run: go build -buildvcs=false -trimpath -o "bin/Le Mans Ultimate.exe" ./cmd/lmu-fixture
        working-directory: bridge
      - run: |
          $env:APEX_LMU_BRIDGE_EXE = (Resolve-Path 'bin/apex-lmu-bridge.exe')
          $env:APEX_LMU_FIXTURE_EXE = (Resolve-Path 'bin/Le Mans Ultimate.exe')
          go test -buildvcs=false ./...
        working-directory: bridge
      - run: bridge\bin\apex-lmu-bridge.exe --self-test --frames=8 --run-id=windows-ci > bridge-self-test.ndjson
        shell: cmd
      - run: node scripts/assert-bridge-self-test.cjs bridge-self-test.ndjson 8 windows-ci

  windows-installer:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.24.x'
          cache-dependency-path: bridge/go.mod
      - run: npm ci
      - run: npm run build:desktop:win:all
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apex-for-lmu-windows
          path: |
            release/Apex-for-LMU-Setup-*.exe
            release/Apex-for-LMU-*-win.zip
            release/SHA256SUMS.txt
          if-no-files-found: error
