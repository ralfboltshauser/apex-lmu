name: Verify and package

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.24.x'
          cache-dependency-path: bridge/go.mod
      - run: npm ci
      - run: npm run build
      - run: npm run build:site
      - run: npm run build:feedback-api
      - run: npm run test:all
      - run: npm audit --audit-level=high

  windows-bridge-self-test:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.24.x'
          cache-dependency-path: bridge/go.mod
      - run: npm ci
      - run: npm run build
      - run: npm run test:electron:sqlite
      - run: go build -buildvcs=false -trimpath -o bin/apex-lmu-bridge.exe .
        working-directory: bridge
      - run: go build -buildvcs=false -trimpath -o "bin/Le Mans Ultimate.exe" ./cmd/lmu-fixture
        working-directory: bridge
      - run: |
          $env:APEX_LMU_BRIDGE_EXE = (Resolve-Path 'bin/apex-lmu-bridge.exe')
          $env:APEX_LMU_FIXTURE_EXE = (Resolve-Path 'bin/Le Mans Ultimate.exe')
          go test -buildvcs=false ./...
        working-directory: bridge
      - run: bridge\bin\apex-lmu-bridge.exe --self-test --frames=8 --run-id=windows-ci > bridge-self-test.ndjson
        shell: cmd
      - run: node scripts/assert-bridge-self-test.cjs bridge-self-test.ndjson 8 windows-ci
      - run: npm run test:recording-replay
        env:
          APEX_LMU_BRIDGE_EXE: bridge/bin/apex-lmu-bridge.exe
      - run: npm run test:e2e:windows:replay

  windows-installer:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.24.x'
          cache-dependency-path: bridge/go.mod
      - run: npm ci
      - run: npm run build:desktop:win:all
      - run: npm run test:e2e:windows:replay
        env:
          APEX_E2E_EXECUTABLE: release/win-unpacked/Apex for LMU.exe
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apex-for-lmu-windows
          path: |
            release/Apex-for-LMU-Setup-*.exe
            release/Apex-for-LMU-*-win.zip
            release/SHA256SUMS.txt
          if-no-files-found: error
